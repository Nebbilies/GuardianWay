name: CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner + short sha tag
        id: meta
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (runtime stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/gw-backend:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/gw-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/gw-frontend:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/gw-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
