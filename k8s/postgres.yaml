apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: guardianway
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          envFrom:
            - secretRef: { name: gw-secrets }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [ "sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: guardianway
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
