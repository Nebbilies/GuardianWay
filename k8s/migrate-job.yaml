apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: guardianway
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ${MIGRATE_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /usr/src/app/backend
          command: [ "npx", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma" ]
          envFrom:
            - secretRef: { name: gw-secrets }
