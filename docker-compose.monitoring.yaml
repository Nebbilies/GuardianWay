# Monitoring overlay — NOT started during normal dev.
#
# Run WITH the base stack (merges into one project + network):
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yaml up -d
#
# Dev (app only, lightweight):
#   docker compose up -d
#
# This file is an overlay: it depends on `backend` and `postgres` from
# docker-compose.yml, so never bring it up on its own.

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: always

  alertmanager:
    image: prom/alertmanager:v0.28.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      # single-node
      - --cluster.listen-address=
    ports:
      - "9093:9093"
    restart: always

  webhook-echo:
    image: mendhak/http-https-echo:36
    environment:
      HTTP_PORT: "8080"
    restart: always

  loki:
    image: grafana/loki:3.3.2
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    restart: always

  alloy:
    image: grafana/alloy:v1.6.1
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    depends_on:
      - loki
    restart: always

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://gw:gw_pw@postgres:5432/guardianway?sslmode=disable"
    command:
      - --no-collector.stat_bgwriter
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: always

volumes:
  promdata:
  lokidata:
  grafanadata:
